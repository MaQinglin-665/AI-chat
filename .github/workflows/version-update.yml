name: Version Update After PR Merge

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package version to 1.1.2
        run: |
          node -e "const fs=require('fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version='1.1.2'; fs.writeFileSync(p, JSON.stringify(j,null,2)+'\\n');"

      - name: Commit and push version update
        run: |
          if git diff --quiet; then
            echo "package.json already at 1.1.2"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: set package version to 1.1.2"
            git push origin HEAD:main
          fi
