name: Feature Request
description: Propose a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion. Please describe the user value clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user problem does this solve?
      placeholder: Describe the current pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like to happen?
      placeholder: Describe your preferred solution.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and Boundaries
      description: What is in scope and out of scope?
      placeholder: Keep this request focused and actionable.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives you considered?

  - type: textarea
    id: risks
    attributes:
      label: Risks / Security Considerations
      description: Mention any impact on privacy, permissions, tools, shell execution, or data handling.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-check
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
